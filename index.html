<!DOCTYPE html>
<html lang="fi" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Voon.fi asiakaspalvelu – Tekoälyavustettu chat">
  <meta name="theme-color" content="#0F172A">
  <title>Voon.fi Asiakaspalvelu</title>

  <!--
    Chatbot-konfiguraatio — EI API-avaimia tähän tiedostoon.
    API-avain asetetaan Vercel Dashboard → Settings → Environment Variables.
    Katso .env.example
  -->
  <script>
    window.VOON_CHATBOT_CONFIG = {
      // systemPrompt voidaan ylikirjoittaa tässä — ei arkaluonteista tietoa
      systemPrompt: `Olet Voon.fi:n asiakaspalveluassistentti nimeltä "Voon Assistentti".

OHJEET:
- Vastaa aina suomeksi, kohteliaasti ja ytimekkäästi
- Auta tilausten, laskutuksen, teknisten ongelmien ja tilin hallinnan asioissa
- Kysy tarvittaessa tilausnumero tai sähköposti tunnistautumiseen
- Jos ongelma on monimutkainen, tarjoa yhdistämistä ihmisasiakaspalvelijaan
- Älä lupaa asioita, joita et voi varmistaa
- Ole empaattinen ja kärsivällinen

VOON.FI PALVELUT:
- [Lisää yrityksen palvelukuvaus tähän]
- Asiakaspalvelu: asiakaspalvelu@voon.fi
- Puh: [numero]
- Aukioloajat: Ma-Pe 9-17`,
    };
  </script>

  <link rel="stylesheet" href="styles/chatbot.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%230F172A'/><path d='M20 65c0-16.569 13.431-30 30-30s30 13.431 30 30' stroke='%2322d3ee' stroke-width='6' stroke-linecap='round' fill='none'/><circle cx='35' cy='42' r='5' fill='%2322d3ee'/><circle cx='65' cy='42' r='5' fill='%2322d3ee'/></svg>">
</head>
<body class="chatbot-standalone">

  <!-- Standalone chatbot container -->
  <div id="voon-chatbot-root" aria-label="Voon.fi asiakaspalvelu chatbot"></div>

  <script type="module">
    import { VoonChatbot } from './scripts/chatbot.js';

    // Initialize chatbot
    const chatbot = new VoonChatbot('#voon-chatbot-root');

    // Expose for external control
    window.VoonChat = chatbot;

    // Example: show survey after 10 minutes of inactivity
    let inactivityTimer;
    function resetInactivity() {
      clearTimeout(inactivityTimer);
      inactivityTimer = setTimeout(() => {
        if (chatbot.messages.length > 2) {
          chatbot.showSurvey();
        }
      }, 10 * 60 * 1000);
    }
    document.addEventListener('mousemove', resetInactivity, { passive: true });
    document.addEventListener('keydown', resetInactivity, { passive: true });
    resetInactivity();
  </script>

</body>
</html>
