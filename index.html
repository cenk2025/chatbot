<!DOCTYPE html>
<html lang="fi" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Voon.fi asiakaspalvelu – Tekoälyavustettu chat">
  <meta name="theme-color" content="#070b14">
  <title>Voon.fi Asiakaspalvelu</title>
  <!-- API-avain ja system prompt ovat Vercel-palvelimella (api/chat.js) -->
  <link rel="stylesheet" href="styles/chatbot.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 80'><path d='M5 5 L50 75 L95 5' stroke='%231a35c4' stroke-width='18' stroke-linecap='round' stroke-linejoin='round' fill='none'/></svg>">
</head>
<body class="chatbot-standalone">

  <div id="voon-chatbot-root" aria-label="Voon.fi asiakaspalvelu"></div>

  <script type="module">
    import { VoonChatbot } from './scripts/chatbot.js';

    const chatbot = new VoonChatbot('#voon-chatbot-root');
    window.VoonChat = chatbot;

    // Memnuniyet anketi 10 min hareketsizlikte
    let timer;
    const reset = () => {
      clearTimeout(timer);
      timer = setTimeout(() => { if (chatbot.messages.length > 2) chatbot.showSurvey(); }, 10*60*1000);
    };
    document.addEventListener('mousemove', reset, { passive:true });
    document.addEventListener('keydown', reset, { passive:true });
    reset();
  </script>

</body>
</html>
